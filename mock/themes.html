<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kick It — Theme Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#0e0e10; color:#e8e8ea; font-family:'Inter',sans-serif; padding:40px 24px 80px; }
  .head { max-width:980px; margin:0 auto 36px; }
  .head h1 { font-family:'Space Grotesk',sans-serif; font-size:30px; font-weight:700; letter-spacing:-.5px; }
  .head p { color:#9a9aa2; margin-top:8px; font-size:15px; line-height:1.5; max-width:640px; }
  .board { display:grid; grid-template-columns:repeat(2, max-content); gap:48px 56px; justify-content:center; }
  .cell { display:flex; flex-direction:column; align-items:center; gap:16px; }
  .cell .tag { text-align:center; }
  .cell .tag .name { font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:17px; }
  .cell .tag .desc { color:#8e8e96; font-size:12.5px; margin-top:3px; max-width:320px; line-height:1.4; }

  /* ---------- shared phone shell ---------- */
  .ph {
    width:340px; height:660px; border-radius:42px; padding:11px;
    background:#000; box-shadow:0 30px 60px rgba(0,0,0,.5); position:relative; flex:none;
  }
  .scr {
    width:100%; height:100%; border-radius:32px; overflow:hidden; position:relative;
    background:var(--bg); color:var(--ink); font-family:var(--font);
    display:flex; flex-direction:column;
  }
  .ic { width:21px; height:21px; display:block; }
  .bar { display:flex; justify-content:space-between; padding:13px 22px 4px; font-size:12px; font-weight:700; }
  .hd { display:flex; align-items:center; justify-content:space-between; padding:6px 20px 12px; }
  .brand { font-family:var(--dfont); font-weight:var(--dwt); font-size:23px; letter-spacing:-.4px; }
  .brand span { color:var(--accent); }
  .hd-ic { display:flex; gap:14px; } .hd-ic .ic { width:20px; height:20px; color:var(--ink); }
  .body { flex:1; overflow:hidden; padding:0 16px; display:flex; flex-direction:column; gap:14px; }

  .card2 { background:var(--card); border-radius:var(--r); overflow:hidden; border:1px solid var(--line); box-shadow:var(--sh); }
  .pimg { height:148px; background-size:cover; background-position:center; filter:var(--imgf); position:relative; }
  .pimg .acc { position:absolute; top:11px; left:11px; font-size:10.5px; font-weight:700; padding:4px 9px; border-radius:999px;
    background:var(--accent); color:var(--accent-ink); display:flex; align-items:center; gap:4px; }
  .acc .ic { width:13px; height:13px; }
  .cb { padding:13px 14px 14px; }
  .trow { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  .ttl { font-family:var(--dfont); font-weight:var(--dwt); font-size:18px; letter-spacing:-.2px; line-height:1.1; }
  .score2 { font-family:var(--dfont); font-weight:700; font-size:15px; color:var(--accent-ink); background:var(--accent);
    min-width:38px; height:34px; padding:0 6px; border-radius:var(--r-sm); display:grid; place-items:center; flex:none; }
  .meta { display:flex; align-items:center; gap:5px; color:var(--sub); font-size:12px; margin-top:5px; }
  .meta .ic { width:13px; height:13px; }
  .rev { font-size:12.5px; line-height:1.5; margin-top:9px; color:var(--ink); opacity:.82; font-style:var(--revi); }
  .badges { display:flex; gap:16px; margin-top:13px; }
  .b3 { display:flex; flex-direction:column; align-items:center; gap:5px; }
  .b3 .circ { width:40px; height:40px; border-radius:50%; display:grid; place-items:center;
    background:var(--chip); border:1px solid var(--line); color:var(--ink); }
  .b3 .circ .ic { width:18px; height:18px; }
  .b3.on .circ { background:var(--accent); border-color:var(--accent); color:var(--accent-ink); }
  .b3 .l { font-size:10px; font-weight:600; color:var(--sub); }
  .b3.on .l { color:var(--ink); font-weight:700; }

  /* compact second card */
  .card2.row { display:flex; align-items:center; gap:12px; padding:11px; }
  .card2.row .thumb { width:50px; height:50px; border-radius:calc(var(--r-sm) + 2px); background-size:cover; background-position:center; filter:var(--imgf); flex:none; }
  .card2.row .ttl { font-size:15px; }
  .card2.row .meta { margin-top:3px; }

  /* nav */
  .nav { position:absolute; bottom:0; left:0; right:0; padding:14px 30px calc(14px + env(safe-area-inset-bottom));
    display:flex; align-items:center; justify-content:space-between; }
  .nav.dock { background:var(--dock); border-top:1px solid var(--line); }
  .nav .n { color:var(--navink); } .nav .n .ic { width:25px; height:25px; }
  .nav .n.active { color:var(--accent); }
  .nav .n.add .ic { width:33px; height:33px; color:var(--accent); }

  /* ============ THEME 1 · EDITORIAL MONO ============ */
  .t1 { --bg:#FBFAF7; --card:#FFFFFF; --ink:#1A1813; --sub:#9b9587; --accent:#C8472A; --accent-ink:#fff;
    --line:#ECE8DF; --chip:#F6F3EC; --dock:#FBFAF7ee;
    --font:'Inter'; --dfont:'Space Grotesk'; --dwt:600; --r:16px; --r-sm:10px; --sh:0 4px 14px rgba(0,0,0,.04);
    --imgf:none; --revi:normal; --navink:#1A1813; }
  /* ============ THEME 2 · MIDNIGHT ============ */
  .t2 { --bg:#0F1115; --card:#181B22; --ink:#EDEFF2; --sub:#7d828f; --accent:#C8F751; --accent-ink:#10130a;
    --line:#23262F; --chip:#20242C; --dock:#0F1115ee;
    --font:'Inter'; --dfont:'Space Grotesk'; --dwt:600; --r:20px; --r-sm:12px; --sh:0 8px 24px rgba(0,0,0,.4);
    --imgf:saturate(1.1) contrast(1.02); --revi:normal; --navink:#EDEFF2; }
  /* ============ THEME 3 · SUNSET POP ============ */
  .t3 { --bg:#FFF0E8; --card:#FFFFFF; --ink:#2C1810; --sub:#b08a78; --accent:#FF5635; --accent-ink:#fff;
    --line:#FBE0D2; --chip:#FFEDE4; --dock:#FFF0E8ee;
    --font:'DM Sans'; --dfont:'DM Sans'; --dwt:800; --r:26px; --r-sm:15px; --sh:0 10px 26px rgba(255,86,53,.12);
    --imgf:saturate(1.12); --revi:normal; --navink:#2C1810; }
  /* ============ THEME 4 · CLEAN SLATE ============ */
  .t4 { --bg:#FFFFFF; --card:#FFFFFF; --ink:#0F1B2D; --sub:#9aa6b6; --accent:#1488E6; --accent-ink:#fff;
    --line:#EAEEF3; --chip:#F2F6FB; --dock:#FFFFFFf2;
    --font:'Inter'; --dfont:'Inter'; --dwt:800; --r:18px; --r-sm:11px; --sh:0 6px 18px rgba(15,27,45,.06);
    --imgf:none; --revi:normal; --navink:#0F1B2D; }
  /* ============ THEME 5 · WARM ANALOG (current, icon-fied) ============ */
  .t5 { --bg:#F4ECD9; --card:#FBF6EC; --ink:#3A2E25; --sub:#8a7a66; --accent:#C0563A; --accent-ink:#fff;
    --line:#E2D5BC; --chip:#EFE4CC; --dock:#FBF6ECec;
    --font:'DM Sans'; --dfont:'Fraunces'; --dwt:700; --r:22px; --r-sm:13px; --sh:0 8px 22px rgba(58,46,37,.1);
    --imgf:sepia(.18) saturate(1.05) contrast(1.03); --revi:italic; --navink:#3A2E25; }
  /* ============ THEME 6 · EDITORIAL SERIF ============ */
  .t6 { --bg:#F3F1EA; --card:#FFFFFF; --ink:#201D17; --sub:#928c7e; --accent:#3F6B4C; --accent-ink:#fff;
    --line:#E6E2D6; --chip:#EFEDE4; --dock:#F3F1EAee;
    --font:'Inter'; --dfont:'Instrument Serif'; --dwt:400; --r:8px; --r-sm:6px; --sh:0 3px 12px rgba(0,0,0,.05);
    --imgf:grayscale(.15) contrast(1.03); --revi:italic; --navink:#201D17; }
</style>
</head>
<body>
  <div class="head">
    <h1>Kick It — six theme directions</h1>
    <p>Same screen, six looks, all with real line icons (Lucide) and no emoji. Tap through the live app stays warm-analog (Theme 5) for now — tell me which direction you want and I'll reskin every screen to match.</p>
  </div>
  <div class="board" id="board"></div>

<script>
  const svg = (inner,w='1.9') => `<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round">${inner}</svg>`;
  const I = {
    search: svg('<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>'),
    bell: svg('<path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/>'),
    pin: svg('<path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/>'),
    lock: svg('<rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>'),
    music: svg('<path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>'),
    zap: svg('<path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>'),
    users: svg('<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>'),
    waves: svg('<path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 12c.6.5 1.2 1 2.5 1C7 13 7 11 9.5 11c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 18c.6.5 1.2 1 2.5 1C7 19 7 17 9.5 17c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>'),
    sun: svg('<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>'),
    home: svg('<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/>'),
    compass: svg('<path d="m16.24 7.76-1.804 5.411a2 2 0 0 1-1.265 1.265L7.76 16.24l1.804-5.411a2 2 0 0 1 1.265-1.265z"/><circle cx="12" cy="12" r="10"/>'),
    plus: svg('<circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/>'),
    user: svg('<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>'),
  };

  const phone = (cls) => `
   <div class="ph"><div class="scr ${cls}">
     <div class="bar"><span>9:41</span><span>Kick It</span></div>
     <div class="hd">
       <div class="brand">Kick It<span>.</span></div>
       <div class="hd-ic">${I.search}${I.bell}</div>
     </div>
     <div class="body">
       <div class="card2">
         <div class="pimg" style="background-image:url('https://picsum.photos/seed/rooftop9/700/420')">
           <div class="acc">${I.users} friends</div>
         </div>
         <div class="cb">
           <div class="trow">
             <div>
               <div class="ttl">Marcus's Rooftop</div>
               <div class="meta">${I.pin} Eastside · rooftop · holds 12</div>
             </div>
             <div class="score2">8.9</div>
           </div>
           <div class="rev">"Best skyline in the city. We strung lights, dragged a couch up the fire escape, neighbors never complained…"</div>
           <div class="badges">
             <div class="b3"><div class="circ">${I.music}</div><div class="l">Aux</div></div>
             <div class="b3 on"><div class="circ">${I.zap}</div><div class="l">Charging</div></div>
             <div class="b3"><div class="circ">${I.users}</div><div class="l">Big group</div></div>
             <div class="b3"><div class="circ">${I.sun}</div><div class="l">City view</div></div>
           </div>
         </div>
       </div>

       <div class="card2 row">
         <div class="thumb" style="background-image:url('https://picsum.photos/seed/pontoon7/200/200')"></div>
         <div style="flex:1;">
           <div class="ttl">Uncle Rick's Pontoon</div>
           <div class="meta">${I.waves} Lake Mendota · #1 on your list</div>
         </div>
         <div class="score2">9.6</div>
       </div>
     </div>
     <div class="nav dock">
       <span class="n active">${I.home}</span>
       <span class="n">${I.compass}</span>
       <span class="n add">${I.plus}</span>
       <span class="n">${I.pin}</span>
       <span class="n">${I.user}</span>
     </div>
   </div></div>`;

  const themes = [
    ['t1','Editorial Mono','Crisp paper-white, Space Grotesk, one rust accent. Calm, premium, content-first.'],
    ['t2','Midnight','Dark charcoal + electric lime. Nightlife energy, great for bars & late spots.'],
    ['t3','Sunset Pop','Warm coral on peach, big rounded shapes, bold DM Sans. Friendly and shareable.'],
    ['t4','Clean Slate','Pure white, sky-blue accent, lots of air. Familiar, trustworthy, Beli-adjacent.'],
    ['t5','Warm Analog','Your current cozy cream/olive/rust — now with line icons instead of emoji.'],
    ['t6','Editorial Serif','Magazine feel: Instrument Serif headlines, sharp corners, forest-green accent.'],
  ];

  document.getElementById('board').innerHTML = themes.map(([cls,name,desc]) => `
    <div class="cell">
      <div class="tag"><div class="name">${name}</div><div class="desc">${desc}</div></div>
      ${phone(cls)}
    </div>`).join('');
</script>
</body>
</html>
